        run: pnpm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-node${{ matrix.node-version }}-mysql
          path: '**/playwright-report/'
          retention-days: 30
