      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Restore dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node${{ matrix.node-version }}-deps-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore build outputs
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            apps/*/dist
          key: ${{ runner.os }}-node${{ matrix.node-version }}-build-${{ hashFiles('pnpm-lock.yaml', 'packages/**', 'apps/**') }}
      - name: Run e2e tests
        run: pnpm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-node${{ matrix.node-version }}-postgres
          path: '**/playwright-report/'
          retention-days: 30

  test-e2e-mysql:
    needs: [install, build, lint, typescript]
    name: 'test:e2e (mysql, node ${{ matrix.node-version }})'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
